<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultats de recherche | scoop243.net</title>
    <link rel="icon" type="image/png" href="https://qkzzhjeeuierlqkqexrf.supabase.co/storage/v1/object/public/Logo/votre-logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
    :root { --orange-media: #F37021; }
    .bg-orange-media { background-color: var(--orange-media); }
    .text-orange-media { color: var(--orange-media); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-x-hidden">

    <div class="bg-black text-white py-1.5 text-[10px] uppercase tracking-widest border-b border-white/10">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span id="current-date" class="font-bold text-orange-media"></span>
                <span id="live-clock" class="bg-orange-media text-black px-2 py-0.5 rounded font-black"></span>
            </div>
            <div class="hidden md:block italic text-gray-400">Recherche d'actualités</div>
        </div>
    </div>

    <header class="bg-white border-b" style="padding: 0.25cm 0;">
        <div class="container mx-auto px-4 flex flex-col justify-center items-center">
            <a href="index.html">
                <img src="https://qkzzhjeeuierlqkqexrf.supabase.co/storage/v1/object/public/Logo/Nouveau%20projet.png" alt="Logo" class="h-24 md:h-40 lg:h-48 w-auto object-contain">
            </a>
        </div>
    </header>

    <nav class="bg-orange-media sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex items-center justify-between px-2 md:px-4 gap-4">
            <button id="mobile-menu-btn" class="md:hidden text-white p-4 focus:outline-none">
                <i class="fas fa-bars text-xl"></i>
            </button>

            <ul id="mobile-menu-content" class="hidden absolute top-full left-0 w-full bg-orange-media flex-col md:static md:w-auto md:flex md:flex-row overflow-x-auto hide-scrollbar text-white font-bold uppercase text-[11px] md:text-sm tracking-wide border-t border-white/10 md:border-none">
                <li class="whitespace-nowrap"><a href="index.html" class="px-4 py-4 block hover:bg-black/10 transition">Accueil</a></li>
                <li class="whitespace-nowrap"><a href="politique.html" class="px-4 py-4 block hover:bg-black/10 transition">Politique</a></li>
                <li class="whitespace-nowrap"><a href="justice.html" class="px-4 py-4 block hover:bg-black/10 transition">Justice</a></li>
                <li class="whitespace-nowrap"><a href="economie.html" class="px-4 py-4 block hover:bg-black/10 transition">Économie</a></li>
                <li class="whitespace-nowrap"><a href="culture.html" class="px-4 py-4 block hover:bg-black/10 transition">Culture</a></li>
                <li class="whitespace-nowrap"><a href="faits_divers.html" class="px-4 py-4 block hover:bg-black/10 transition">Faits divers</a></li>
                <li class="whitespace-nowrap"><a href="religion.html" class="px-4 py-4 block hover:bg-black/10 transition">Religion</a></li>
                <li class="whitespace-nowrap"><a href="informateur.html" class="px-4 py-4 block hover:bg-black/10 transition text-yellow-300"><i class="fas fa-bullhorn mr-1"></i> Informateur</a></li>
            </ul>

            <div class="flex-1 max-w-[200px] md:max-w-xs relative my-2 pr-2">
                <input type="text" id="search-input" placeholder="Rechercher..." class="w-full bg-white/20 text-white placeholder-white/70 border-none rounded-full py-1.5 px-4 text-xs focus:ring-2 focus:ring-white/50 outline-none transition">
                <button id="search-btn" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/70 hover:text-white">
                    <i class="fas fa-search text-xs"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 min-h-[60vh]">
        <h1 class="text-2xl font-black uppercase border-l-4 border-orange-media pl-3 mb-8">
            Résultats pour : <span id="search-query-display" class="text-orange-media">...</span>
        </h1>
        
        <div id="search-results-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-gray-500 italic">Recherche en cours dans la base de données...</p>
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-10 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">&copy; 2026 scoop243.net - Tous droits réservés.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
    <script src="config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 1. HORLOGE ET DATE ---
            const updateClock = () => {
                const now = new Date();
                const clockEl = document.getElementById('live-clock');
                const dateEl = document.getElementById('current-date');
                
                if (clockEl) clockEl.textContent = now.toLocaleTimeString('fr-FR');
                if (dateEl) {
                    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                    dateEl.textContent = now.toLocaleDateString('fr-FR', options);
                }
            };
            setInterval(updateClock, 1000);
            updateClock();

            // --- 2. MENU MOBILE ---
            const menuBtn = document.getElementById('mobile-menu-btn');
            const menuContent = document.getElementById('mobile-menu-content');
            
            if (menuBtn && menuContent) {
                menuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    menuContent.classList.toggle('hidden');
                    const icon = menuBtn.querySelector('i');
                    if (icon) {
                        icon.classList.toggle('fa-bars');
                        icon.classList.toggle('fa-times');
                    }
                });

                document.addEventListener('click', (e) => {
                    if (!menuContent.contains(e.target) && !menuBtn.contains(e.target)) {
                        menuContent.classList.add('hidden');
                        const icon = menuBtn.querySelector('i');
                        if (icon) { icon.classList.add('fa-bars'); icon.classList.remove('fa-times'); }
                    }
                });
            }

            // --- 3. LOGIQUE DE RECHERCHE ---
            const params = new URLSearchParams(window.location.search);
            const query = params.get('q');
            const displayEl = document.getElementById('search-query-display');
            const container = document.getElementById('search-results-container');

            if (query) {
                displayEl.textContent = `"${query}"`;
                performSearch(query);
            }

            async function performSearch(q) {
                try {
                    const { data, error } = await supabaseClient
                        .from('articles')
                        .select('*')
                        .or(`title.ilike.%${q}%,content.ilike.%${q}%`)
                        .order('created_at', { ascending: false });

                    if (error) throw error;

                    if (!data || data.length === 0) {
                        container.innerHTML = `<p class="col-span-full text-center py-12 text-gray-400 font-medium italic">Aucun article ne correspond à votre recherche.</p>`;
                        return;
                    }

                    container.innerHTML = data.map(art => `
                        <article class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition">
                            <div class="p-5">
                                <span class="text-[9px] uppercase font-bold text-orange-media">${art.category || 'Actualité'}</span>
                                <h2 class="text-lg font-bold mt-2 leading-tight">
                                    <a href="article-details.html?id=${art.id}" class="hover:text-orange-media">${art.title}</a>
                                </h2>
                                <p class="text-gray-600 text-xs mt-3 line-clamp-3">${art.content.substring(0, 100)}...</p>
                            </div>
                        </article>
                    `).join('');

                } catch (err) {
                    container.innerHTML = `<p class="text-red-500">Erreur de connexion à la base de données.</p>`;
                }
            }

            // --- 4. BARRE DE RECHERCHE (Header) ---
            const searchInput = document.getElementById('search-input');
            const searchBtn = document.getElementById('search-btn');
            if (searchInput) {
                const doSearch = () => {
                    const val = searchInput.value.trim();
                    if (val) window.location.href = `search-results.html?q=${encodeURIComponent(val)}`;
                };
                if (searchBtn) searchBtn.addEventListener('click', doSearch);
                searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') doSearch(); });
            }
        });
    </script>
</body>
</html>
